<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Instagram – Log In</title>


  <link rel="stylesheet" href="./instagram.css">
</head>
<body>


  <main class="page">


    <section class="instagram">

      <div class="instagram-image">
     
        <img src="https://play-lh.googleusercontent.com/BJgy51ohXrbeushjspUbDZguX6wpvpYKppCf7iCc4mLHSqh-VI9D6IY_usH5aeGfHnWF=w526-h296-rw" alt="Instagram phone preview">
        <p class="image-placeholder">Phone image here</p>
      </div>


      <div class="instagram-form">

        <div class="card">
          <h1 class="logo">Instagram</h1>

          <form>
            <label class="visually-hidden" for="username">
              Phone number, username, or email
            </label>
            <input
              id="username"
              type="text"
              placeholder="Phone number, username, or email"
              required
            >

            <label class="visually-hidden" for="password">
              Password
            </label>
            <input
              id="password"
              type="password"
              placeholder="Password"
              required
            >

            <button type="submit">Log in</button>

         
            <div class="or">
              <span></span>
              <p>OR</p>
              <span></span>
            </div>

            <a href="#" class="facebook-login">Log in with Facebook</a>
            <a href="#" class="forgot">Forgot password?</a>
          </form>
        </div>

 
        <div class="card signup">
          <p>
            Don’t have an account?
            <a href="#">Sign up</a>
          </p>
        </div>

      </div>
    </section>

  </main>

</body>
</html>
