<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <title>Facebook – Log In</title>

  <link rel="stylesheet" href="facebook.css" />
</head>
<body>
  <main class="center-page">
    <section class="fb container fb-layout" aria-label="Facebook login page">
      <div class="fb-left">
        <h1 class="fb-logo" aria-label="facebook">facebook</h1>
        <p class="fb-tagline">Facebook helps you connect and share with the people in your life.</p>
      </div>

      <div class="fb-right card">
        <form class="fb-form" action="#" method="post">
          <div class="field">
            <label class="visually-hidden" for="fb-email">Email or phone number</label>
            <input id="fb-email" name="email" type="text" placeholder="Email or phone number" required />
          </div>

          <div class="field">
            <label class="visually-hidden" for="fb-pass">Password</label>
            <input id="fb-pass" name="password" type="password" placeholder="Password" required />
          </div>

          <button class="btn btn-primary" type="submit">Log In</button>

          <a class="fb-link" href="#">Forgot password?</a>

          <div class="divider" role="presentation"></div>

          <a class="btn btn-green" href="#" role="button">Create new account</a>
        </form>

        <p class="fb-small">
          <a class="fb-link-bold" href="#">Create a Page</a> for a celebrity, brand or business.
        </p>
      </div>
    </section>
  </main>
</body>
</html>
